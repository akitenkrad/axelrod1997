<svg width="100%" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>The Dissemination of Culture — Axelrod (1997)</title>
<desc>A 2D lattice of cells colored by culture, converging locally into regions while remaining globally polarized.</desc>
<style>
  .ts    { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 13px; fill: #444441; }
  .tl    { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 12px; font-weight: 600; fill: #534AB7; letter-spacing: 2px; }
  .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 30px; font-weight: 600; fill: #2C2C2A; }
  .glab  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 11px; font-weight: 500; fill: #888780; letter-spacing: 0.5px; }
  .gray-fill   { fill: #F1EFE8; stroke: #C7C5BD; stroke-width: 0.6; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.6; }
  .teal-fill   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.6; }
  .arrd { stroke: #534AB7; stroke-width: 1.6; fill: none; }
  @media (prefers-color-scheme: dark) {
    .ts    { fill: #C7C5BD; }
    .tl    { fill: #AFA9EC; }
    .title { fill: #E5E5E2; }
    .glab  { fill: #8C8B85; }
    .gray-fill   { fill: #3A3A37; stroke: #5F5E5A; }
    .purple-fill { fill: #534AB7; stroke: #AFA9EC; }
    .teal-fill   { fill: #0F6E56; stroke: #5DCAA5; }
    .arrd { stroke: #AFA9EC; }
  }
</style>
<defs>
<marker id="arrowAccent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- title block (left) -->
<text class="tl"    x="44" y="96">LOCAL CONVERGENCE · GLOBAL POLARIZATION</text>
<text class="title" x="42" y="140">The Dissemination</text>
<text class="title" x="42" y="178">of Culture</text>
<text class="ts"    x="44" y="212">Axelrod (1997) — a cellular model of cultural change.</text>

<!-- MOTIF (right): two lattices joined by an accent arrow.
     Left = random initial cultures (scattered colors).
     Right = converged state (cells coalesced into a few cultural regions). -->

<!-- left lattice: random initial cultures (4x4) -->
<rect class="gray-fill"   x="556" y="92"  width="22" height="22" rx="3"/>
<rect class="teal-fill"   x="580" y="92"  width="22" height="22" rx="3"/>
<rect class="purple-fill" x="604" y="92"  width="22" height="22" rx="3"/>
<rect class="teal-fill"   x="628" y="92"  width="22" height="22" rx="3"/>
<rect class="purple-fill" x="556" y="116" width="22" height="22" rx="3"/>
<rect class="gray-fill"   x="580" y="116" width="22" height="22" rx="3"/>
<rect class="teal-fill"   x="604" y="116" width="22" height="22" rx="3"/>
<rect class="purple-fill" x="628" y="116" width="22" height="22" rx="3"/>
<rect class="teal-fill"   x="556" y="140" width="22" height="22" rx="3"/>
<rect class="purple-fill" x="580" y="140" width="22" height="22" rx="3"/>
<rect class="gray-fill"   x="604" y="140" width="22" height="22" rx="3"/>
<rect class="teal-fill"   x="628" y="140" width="22" height="22" rx="3"/>
<rect class="purple-fill" x="556" y="164" width="22" height="22" rx="3"/>
<rect class="teal-fill"   x="580" y="164" width="22" height="22" rx="3"/>
<rect class="purple-fill" x="604" y="164" width="22" height="22" rx="3"/>
<rect class="gray-fill"   x="628" y="164" width="22" height="22" rx="3"/>
<text class="glab" x="556" y="206">initial</text>

<!-- accent arrow -->
<path d="M662 138 H716" class="arrd" marker-end="url(#arrowAccent)"/>

<!-- right lattice: converged into a few cultural regions (4x4) -->
<rect class="purple-fill" x="724" y="92"  width="22" height="22" rx="3"/>
<rect class="purple-fill" x="748" y="92"  width="22" height="22" rx="3"/>
<rect class="teal-fill"   x="772" y="92"  width="22" height="22" rx="3"/>
<rect class="teal-fill"   x="796" y="92"  width="22" height="22" rx="3"/>
<rect class="purple-fill" x="724" y="116" width="22" height="22" rx="3"/>
<rect class="purple-fill" x="748" y="116" width="22" height="22" rx="3"/>
<rect class="teal-fill"   x="772" y="116" width="22" height="22" rx="3"/>
<rect class="teal-fill"   x="796" y="116" width="22" height="22" rx="3"/>
<rect class="purple-fill" x="724" y="140" width="22" height="22" rx="3"/>
<rect class="gray-fill"   x="748" y="140" width="22" height="22" rx="3"/>
<rect class="gray-fill"   x="772" y="140" width="22" height="22" rx="3"/>
<rect class="teal-fill"   x="796" y="140" width="22" height="22" rx="3"/>
<rect class="gray-fill"   x="724" y="164" width="22" height="22" rx="3"/>
<rect class="gray-fill"   x="748" y="164" width="22" height="22" rx="3"/>
<rect class="gray-fill"   x="772" y="164" width="22" height="22" rx="3"/>
<rect class="teal-fill"   x="796" y="164" width="22" height="22" rx="3"/>
<text class="glab" x="724" y="206">stable regions</text>
</svg>
